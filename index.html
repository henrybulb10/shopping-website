<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyShop Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fa;
}

/* Header */
header {
  background: #0f172a;
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header input {
  padding: 8px;
  border-radius: 5px;
  border: none;
  width: 200px;
}

.cart-btn {
  background: #22c55e;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* Filters */
.filters {
  padding: 10px 20px;
}

.filters select {
  padding: 8px;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 20px;
  padding: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  text-align: center;
}

.product img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.product button {
  background: #0f172a;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  cursor: pointer;
}

/* Cart */
.cart {
  position: fixed;
  right: -350px;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  padding: 20px;
  box-shadow: -3px 0 10px rgba(0,0,0,0.2);
  transition: 0.3s;
  overflow-y: auto;
}

.cart.active {
  right: 0;
}

.cart-item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.cart-item button {
  padding: 2px 6px;
}

/* Checkout */
.checkout-btn {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 6px;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h2>MyShop Pro</h2>
  <input type="text" id="search" placeholder="Search products..." oninput="renderProducts()">
  <button class="cart-btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</header>

<div class="filters">
  <select id="category" onchange="renderProducts()">
    <option value="all">All Categories</option>
    <option value="fashion">Fashion</option>
    <option value="electronics">Electronics</option>
    <option value="accessories">Accessories</option>
  </select>
</div>

<div id="products" class="products"></div>

<div id="cart" class="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: $<span id="total">0</span></h4>
  <button class="checkout-btn" onclick="checkout()">Checkout</button>
</div>

<script>
const products = [
  {name:"Running Shoes", price:45, category:"fashion"},
  {name:"Smart Watch", price:70, category:"electronics"},
  {name:"Headphones", price:35, category:"electronics"},
  {name:"Backpack", price:25, category:"fashion"},
  {name:"Sunglasses", price:20, category:"accessories"},
  {name:"Cap", price:10, category:"fashion"},
  {name:"Keyboard", price:30, category:"electronics"},
  {name:"Bracelet", price:15, category:"accessories"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* Render Products */
function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();
  const category = document.getElementById("category").value;

  const filtered = products.filter(p =>
    (category === "all" || p.category === category) &&
    p.name.toLowerCase().includes(search)
  );

  filtered.forEach((p, i) => {
    container.innerHTML += `
      <div class="product">
        <img src="https://picsum.photos/200?random=${i}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
      </div>
    `;
  });
}

/* Cart Logic */
function addToCart(name, price) {
  const existing = cart.find(i => i.name === name);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({name, price, qty:1});
  }
  updateCart();
}

function updateCart() {
  const cartEl = document.getElementById("cartItems");
  cartEl.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;

    cartEl.innerHTML += `
      <div class="cart-item">
        ${item.name} x${item.qty}
        <div>
          <button onclick="changeQty('${item.name}', -1)">-</button>
          <button onclick="changeQty('${item.name}', 1)">+</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").textContent = total;
  document.getElementById("count").textContent = cart.length;

  localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQty(name, delta) {
  const item = cart.find(i => i.name === name);
  if (!item) return;

  item.qty += delta;
  if (item.qty <= 0) {
    cart = cart.filter(i => i.name !== name);
  }
  updateCart();
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

/* Checkout */
function checkout() {
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  let message = "🛒 New Order:\n\n";
  let total = 0;

  cart.forEach(item => {
    message += `${item.name} x${item.qty} - $${item.price * item.qty}\n`;
    total += item.price * item.qty;
  });

  message += `\nTotal: $${total}`;

  window.location.href =
   `mailto:henrybulb1.0@gmail.com?subject=New Order&body=${encodeURIComponent(message)}`;
}

/* Init */
renderProducts();
updateCart();
</script>

</body>
</html>
